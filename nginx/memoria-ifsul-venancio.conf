# Configuração Nginx - Site Memória IFSul Venâncio Aires
# Arquivo: memoria-ifsul-venancio.conf
# Tipo: DOMÍNIO PRÓPRIO (produção final)
# Localização no servidor: /etc/nginx/conf.d/apps/memoria-ifsul-venancio.conf
#
# NOTA: Este arquivo é para quando a migração estiver completa e o DNS apontar para
# memoriaifsulvenancio.com.br. Durante a fase de testes, use memoria-ifsul-venancio-subpath.conf
#
# Para aplicar esta configuração:
#   sudo ./nginx/setup-nginx.sh (sem --subpath)
#
# Para voltar ao subpath temporário:
#   sudo ./nginx/setup-nginx.sh --subpath

# Servidor HTTP - domínio raiz redireciona para HTTPS
server {
    listen 80;
    server_name memoriaifsulvenancio.com.br;
    
    # Redirecionar todo tráfego HTTP para HTTPS
    return 301 https://memoriaifsulvenancio.com.br$request_uri;
}

# Servidor HTTP - www redireciona para domínio raiz HTTPS
server {
    listen 80;
    server_name www.memoriaifsulvenancio.com.br;
    return 301 https://memoriaifsulvenancio.com.br$request_uri;
}

# Servidor HTTPS - www redireciona para domínio raiz HTTPS
server {
    listen 443 ssl http2;
    server_name www.memoriaifsulvenancio.com.br;

    # Certificados SSL (gerenciados pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/memoriaifsulvenancio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memoriaifsulvenancio.com.br/privkey.pem;

    return 301 https://memoriaifsulvenancio.com.br$request_uri;
}

# Servidor HTTPS - Configuração Principal
server {
    listen 443 ssl http2;
    server_name memoriaifsulvenancio.com.br;

    # Permite uploads maiores no CMS (deve ser >= limite do Flask).
    client_max_body_size 20M;

    # Certificados SSL (será configurado pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/memoriaifsulvenancio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memoriaifsulvenancio.com.br/privkey.pem;
    
    # Configurações SSL otimizadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logs específicos
    access_log /var/log/nginx/memoria-ifsul-access.log;
    error_log /var/log/nginx/memoria-ifsul-error.log;

    # Proxy para o container Docker
    location / {
        proxy_pass http://127.0.0.1:8092/;
        proxy_http_version 1.1;
        
        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket support (se necessário no futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Página de erro personalizada para 502
    error_page 502 /502.html;
    location = /502.html {
        root /etc/nginx/custom_error_pages;
        internal;
    }
}
