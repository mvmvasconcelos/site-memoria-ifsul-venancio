server {
    listen 80;
    server_name localhost;
    
    # Diretório raiz dos arquivos
    root /usr/share/nginx/html;
    index index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Configurações de segurança básicas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss application/json;

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Página principal e rotas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CSV files - permitir acesso
    location ~* \.csv$ {
        add_header Content-Type "text/csv; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
    }

    # Desabilitar acesso à área administrativa
    location = /admin.html {
        return 404;
    }

    # Negar acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }

    location ~ \.(md|yml|yaml|json|py|sh)$ {
        deny all;
    }
}
