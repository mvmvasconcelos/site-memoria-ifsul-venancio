# Configuração Nginx - Site Memória IFSul Venâncio Aires (Subpath)
# Arquivo: memoria-ifsul-venancio-subpath.conf
# Para uso temporário via subpath até DNS estar configurado

# Redireciona /memoria para /memoria/ (com barra final)
location = /memoria {
    return 301 /memoria/;
}

# Configuração principal do subpath
location /memoria/ {
    # Permite uploads maiores no CMS (deve ser >= limite do Flask).
    client_max_body_size 20M;

    # Proxy para o container Docker
    proxy_pass http://127.0.0.1:8092/;
    proxy_http_version 1.1;
    
    # Headers de proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Cache bypass
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;
    
    # Logs específicos
    access_log /var/log/nginx/memoria-ifsul-access.log;
    error_log /var/log/nginx/memoria-ifsul-error.log;
}
