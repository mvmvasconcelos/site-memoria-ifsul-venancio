# Configuração Nginx - Site Memória IFSul Venâncio Aires (Subpath)
# Arquivo: memoria-ifsul-venancio-subpath.conf
# Tipo: SUBPATH TEMPORÁRIO (fase de testes)
# URL: https://ifva.duckdns.org/memoria/
#
# NOTA: Esta é a configuração temporária via subpath. Quando a migração estiver 100%
# completa e o DNS estiver pronto, mude para memoria-ifsul-venancio.conf
#
# Para aplicar esta configuração:
#   sudo ./nginx/setup-nginx.sh --subpath
#
# Para migrar para domínio próprio:
#   sudo ./nginx/setup-nginx.sh (sem --subpath)

# Redireciona /memoria para /memoria/ (com barra final)
location = /memoria {
    return 301 /memoria/;
}

# Configuração principal do subpath
location /memoria/ {
    # Permite uploads maiores no CMS (deve ser >= limite do Flask).
    client_max_body_size 20M;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Proxy para o container Docker
    proxy_pass http://127.0.0.1:8092/;
    proxy_http_version 1.1;
    
    # Headers de proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Cache bypass
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;
    
    # Logs específicos
    access_log /var/log/nginx/memoria-ifsul-access.log;
    error_log /var/log/nginx/memoria-ifsul-error.log;
}
