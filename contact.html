<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pesquisa de Mestrado ProfEPT com o objetivo a organização, preservação e divulgação do patrimônio cultural do IFSul Campus Venâncio Aires.">
  <title>Contato - Memoria - Memorial IFSul Campus Venâncio Aires</title>
  <link rel="stylesheet" href="src/css/styles.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section>
      <h2>Entre em contato conosco</h2>
      <p>Preencha o formulário abaixo para entrar em contato conosco.</p>
      <form>
        <div class="form-group">
          <label for="name">Nome:</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="message">Mensagem:</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="src/js/main.js"></script>
  <script>
    loadHeaderFooter();
  </script>

</body>
</html>
