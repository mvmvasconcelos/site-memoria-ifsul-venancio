<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/css/styles.css">
  <link rel="stylesheet" href="src/css/timeline.css">
  <title>O Câmpus em Foco</title>
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="timeline-header">
      <h1>O Câmpus em Foco</h1>
      <div class="timeline-years" id="timeline-years">
        <!-- Years will be populated here -->
      </div>
    </section>
    <section class="timeline" id="timeline">
      <!-- Timeline entries will be populated here -->
    </section>
  </main>
  <div id="footer-placeholder"></div>
  

  <script src="src/js/campus.js"></script>
  <script>
    async function loadHeaderFooter() {
      const headerResponse = await fetch('header.html');
      const headerText = await headerResponse.text();
      document.getElementById('header-placeholder').innerHTML = headerText;

      const footerResponse = await fetch('footer.html');
      const footerText = await footerResponse.text();
      document.getElementById('footer-placeholder').innerHTML = footerText;
    }
    loadHeaderFooter();
  </script>
</body>
</html>
