version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memoria-ifsul-venancio
    restart: unless-stopped
    ports:
      - "8092:80"  # Porta host 8092 -> Porta container 80
    networks:
      - memoria_network
    labels:
      - "project=memoria-ifsul-venancio"
      - "environment=production"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  memoria_network:
    name: memoria_network
    driver: bridge
